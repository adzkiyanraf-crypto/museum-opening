<!DOCTYPE html>
<html>
<head>
  <title>Museum Opening</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    .door {
      position: fixed;
      width: 50%;
      height: 100%;
      top: 0;
      background: #3b2a1a;
      transition: transform 2s ease;
      z-index: 2;
    }

    .left {
      left: 0;
      border-right: 3px solid #1a120b;
    }

    .right {
      right: 0;
      border-left: 3px solid #1a120b;
    }

    .open .left {
      transform: translateX(-100%);
    }

    .open .right {
      transform: translateX(100%);
    }

    .content {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1544967082-d8e6a0f1d3c2') center/cover;
    }

    button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      z-index: 3;
    }
  </style>
</head>
<body>

<div class="content"></div>

<div class="door left"></div>
<div class="door right"></div>

<button onclick="openDoor()">Enter The Museum</button>

<script>
  function openDoor() {
    document.body.classList.add("open");
    setTimeout(function() {
      window.location.href = "about-us-2.html"; 
    }, 2000);
  }
</script>

</body>
</html>
